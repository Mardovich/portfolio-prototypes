<script type="text/babel">
const { useState, useRef, useEffect, useMemo, useCallback } = React;

const LEVEL_INT = { L1:1, L2:2, L3:3, L4:4 };
const PRACTICE_COLORS = { Development:'#1d4ed8', QA:'#7c3aed', DevOps:'#047857', Management:'#b45309' };

function capWeight(p) {
  if (p.bucket === 'locked') return Math.max(0.3, LEVEL_INT[p.level] || 1);
  return Math.max(0.3, (LEVEL_INT[p.level] || 1) * p.avail / 100);
}

function matchScore(person, position) {
  const skillMatch     = person.skill === position.skill ? 100 : 30;
  const seniorityDiff  = Math.abs((LEVEL_INT[person.level]||2) - (LEVEL_INT[position.level]||2));
  const seniorityMatch = Math.max(0, 100 - seniorityDiff * 25);
  const locMatch       = (['Any','Remote'].includes(position.loc) || person.loc === position.loc) ? 100 : 40;
  const availMatch     = Math.min(100, person.avail);
  const yoeExpected    = (LEVEL_INT[position.level]||2) * 2;
  const expMatch       = Math.min(100, Math.max(0, 100 - Math.abs((person.yoe||4) - yoeExpected) * 10));
  const total = Math.round(skillMatch*0.35 + seniorityMatch*0.25 + locMatch*0.20 + availMatch*0.12 + expMatch*0.08);
  return { total, axes: { skillMatch, seniorityMatch, locMatch, availMatch, expMatch } };
}

function binarySplit(items, x, y, w, h) {
  if (!items.length) return [];
  if (items.length === 1) return [{ ...items[0], x, y, w, h }];
  const total = items.reduce((s, i) => s + (i.weight || 1), 0);
  let acc = 0, splitIdx = 0;
  const half = total / 2;
  for (let i = 0; i < items.length; i++) {
    acc += items[i].weight || 1;
    if (acc >= half) { splitIdx = i + 1; break; }
  }
  const PAD = 3;
  const ratio1 = acc / total;
  const a = items.slice(0, splitIdx);
  const b = items.slice(splitIdx);
  if (w >= h) {
    const w1 = Math.max(1, Math.round(w * ratio1) - PAD);
    const w2 = Math.max(1, w - w1 - PAD);
    return [...binarySplit(a, x, y, w1, h), ...binarySplit(b, x + w1 + PAD, y, w2, h)];
  } else {
    const h1 = Math.max(1, Math.round(h * ratio1) - PAD);
    const h2 = Math.max(1, h - h1 - PAD);
    return [...binarySplit(a, x, y, w, h1), ...binarySplit(b, x, y + h1 + PAD, w, h2)];
  }
}

function scoreColor(score) {
  if (score >= 80) return 'var(--tone-strong)';
  if (score >= 60) return 'var(--tone-good)';
  if (score >= 40) return 'var(--tone-warn)';
  return 'var(--tone-risk)';
}

function scoreLabel(score) {
  if (score >= 80) return 'Strong Match';
  if (score >= 60) return 'Good Match';
  if (score >= 40) return 'Partial';
  return 'Weak';
}

function scoreVerdict(score) {
  if (score >= 80) return '\u2713 Strong';
  if (score >= 60) return '\u2713 Good';
  if (score >= 40) return '~ Partial';
  return '\u2717 Weak';
}

function lightenColor(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + pct);
  const g = Math.min(255, ((num >> 8) & 0x00FF) + pct);
  const b = Math.min(255, (num & 0x0000FF) + pct);
  return `rgb(${r},${g},${b})`;
}

function Breadcrumb({ drillPath, onNavigate }) {
  const crumbs = [{ label: 'EPAM', path: [] }];
  drillPath.forEach((seg, i) => {
    crumbs.push({ label: seg, path: drillPath.slice(0, i + 1) });
  });
  return React.createElement('div', { className: 'breadcrumb-bar' },
    crumbs.map((c, i) => {
      const isCurrent = i === crumbs.length - 1;
      return React.createElement(React.Fragment, { key: i },
        i > 0 && React.createElement('span', { className: 'crumb-sep' }, '\u203a'),
        React.createElement('span', {
          className: `crumb ${isCurrent ? 'crumb-current' : 'crumb-parent'}`,
          onClick: () => !isCurrent && onNavigate(c.path)
        }, c.label)
      );
    })
  );
}

function AvailableColumn({ people, drillPath, onNavigate, onHoverPerson, onLeavePerson }) {
  const bodyRef = useRef(null);
  const [dims, setDims] = useState({ w: 300, h: 400 });

  useEffect(() => {
    if (!bodyRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const entry of entries) {

            );

function SunburstColumn({ people, drillPath, onNavigate }) {
  const svgRef = useRef(null);
  const [dims, setDims] = useState({ w: 200, h: 400 });
  const [hovArc, setHovArc] = useState(null);

  useEffect(() => {
    if (!svgRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const entry of entries) setDims({ w: entry.contentRect.width, h: entry.contentRect.height });
    });
    ro.observe(svgRef.current);
    return () => ro.disconnect();
  }, []);

  const { arcs, cx, cy, innerR, outerR } = useMemo(() => {
    const practices = {};
    people.forEach(p => {
      if (!practices[p.practice]) practices[p.practice] = { practice: p.practice, weight: 0, skills: {} };
      practices[p.practice].weight += capWeight(p);
      if (!practices[p.practice].skills[p.skill]) practices[p.practice].skills[p.skill] = 0;
      practices[p.practice].skills[p.skill] += capWeight(p);
    });

    const totalWeight = Object.values(practices).reduce((s, p) => s + p.weight, 0);
    const cxv = dims.w / 2;
    const cyv = dims.h / 2;
    const innerRv = Math.min(dims.w, dims.h) * 0.15;
    const outerRv = Math.min(dims.w, dims.h) * 0.35;

    const result = [];
    let angle = 0;
    Object.values(practices).forEach(prac => {
      const pracAngle = (prac.weight / totalWeight) * 2 * Math.PI;
      const color = PRACTICE_COLORS[prac.practice] || '#666';

      result.push({
        type: 'practice',
        startAngle: angle,
        endAngle: angle + pracAngle,
        innerR: innerRv, outerR: outerRv,
        color,
        label: prac.practice,
        count: Object.keys(prac.skills).reduce((s, sk) => s + 1, 0),
        weight: prac.weight
      });

      let skillAngle = angle;
      Object.entries(prac.skills).forEach(([skill, sw]) => {
        const skillArc = (sw / prac.weight) * pracAngle;
        result.push({
          type: 'skill',
          startAngle: skillAngle,
          endAngle: skillAngle + skillArc,
          innerR: outerRv + 4,
          outerR: outerRv + 20,
          color: lightenColor(color, 30),
          label: skill,
          practice: prac.practice,
          count: 1,
          weight: sw
        });
        skillAngle += skillArc;
      });

      angle += pracAngle;
    });

    return { arcs: result, cx: cxv, cy: cyv, innerR: innerRv, outerR: outerRv };
  }, [people, dims]);

  function arcPath(cxv, cyv, r1, r2, startA, endA) {
    const x1i = cxv + r1 * Math.cos(startA);
    const y1i = cyv + r1 * Math.sin(startA);
    const x2i = cxv + r1 * Math.cos(endA);
    const y2i = cyv + r1 * Math.sin(endA);
    const x1o = cxv + r2 * Math.cos(startA);
    const y1o = cyv + r2 * Math.sin(startA);
    const x2o = cxv + r2 * Math.cos(endA);
    const y2o = cyv + r2 * Math.sin(endA);
    const large = endA - startA > Math.PI ? 1 : 0;
    return `M${x1i},${y1i} A${r1},${r1} 0 ${large} 1 ${x2i},${y2i} L${x2o},${y2o} A${r2},${r2} 0 ${large} 0 ${x1o},${y1o} Z`;
  }

  function handleArcClick(arc) {
    if (arc.type === 'practice') {
      if (drillPath[0] === arc.label && drillPath.length === 1) onNavigate([]);
      else onNavigate([arc.label]);
    } else if (arc.type === 'skill') {
      if (drillPath[0] === arc.practice && drillPath[1] === arc.label) onNavigate([arc.practice]);
      else onNavigate([arc.practice, arc.label]);
    }
  }

  function arcOpacity(arc) {
    if (!drillPath.length) return hovArc ? (hovArc === arc ? 1 : 0.5) : 0.85;
    if (arc.type === 'practice') {
      const isActive = arc.label === drillPath[0];
      if (hovArc) return hovArc === arc ? 1 : 0.35;
      return isActive ? 1 : 0.35;
    } else {
      const practiceMatch = arc.practice === drillPath[0];
      const skillMatch = practiceMatch && arc.label === drillPath[1];
      if (hovArc) return hovArc === arc ? 1 : 0.3;
      if (drillPath.length === 1) return practiceMatch ? 0.8 : 0.25;
      return skillMatch ? 1 : 0.25;
    }
  }

  return React.createElement('div', { className: 'col', style: { flex: '1.5' } },
    React.createElement('div', { className: 'col-header' }, 'Capacity Atlas'),
    React.createElement('div', { className: 'col-body' },
      React.createElement('svg', { ref: svgRef, className: 'sunburst-svg', viewBox: `0 0 ${dims.w} ${dims.h}` },
        arcs.map((arc, i) =>
          React.createElement('path', {
            key: i,
            d: arcPath(cx, cy, arc.innerR, arc.outerR, arc.startAngle - Math.PI/2, arc.endAngle - Math.PI/2),
            fill: arc.color,
            stroke: 'var(--bg)',
            strokeWidth: 1,
            opacity: arcOpacity(arc),
            cursor: 'pointer',
            onMouseEnter: () => setHovArc(arc),
            onMouseLeave: () => setHovArc(null),
            onClick: () => handleArcClick(arc)
          })
        ),
        React.createElement('text', { x: cx, y: cy - 6, textAnchor: 'middle', fill: 'var(--text)', fontSize: '10', fontWeight: '600' }, 'Bench'),
        React.createElement('text', { x: cx, y: cy + 8, textAnchor: 'middle', fill: 'var(--text-muted)', fontSize: '8' }, `${people.length} people`),
        drillPath.length > 0 && React.createElement('text', { x: cx, y: cy + 18, textAnchor: 'middle',
          style: { fontSize: 8, fill: 'var(--action)', cursor: 'pointer' },
          onClick: () => onNavigate([])
        }, '\u21a9 clear')
      ),
      hovArc && React.createElement('div', { className: 'sunburst-tooltip' },
        React.createElement('strong', {}, hovArc.label),
        React.createElement('span', {}, `${hovArc.count} people \u00b7 ${hovArc.weight.toFixed(1)} cap`)
      )
    )
  );
}

function RadarColumn({ activeMatch }) {
  const svgRef = useRef(null);
  const [dims, setDims] = useState({ w: 200, h: 300 });
  const [hovAxis, setHovAxis] = useState(null);

  useEffect(() => {
    if (!svgRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const entry of entries) setDims({ w: entry.contentRect.width, h: entry.contentRect.height });
    });
    ro.observe(svgRef.current);
    return () => ro.disconnect();
  }, []);

  if (!activeMatch) {
    return React.createElement('div', { className: 'col', style: { flex: '1' } },
      React.createElement('div', { className: 'col-header' }, 'Match Radar'),
      React.createElement('div', { className: 'col-body' },
        React.createElement('div', { className: 'radar-placeholder' }, 'Drop a candidate onto a position to see match radar')
      )
    );
  }

  const { person, position, score } = activeMatch;
  const axes = ['skillMatch', 'seniorityMatch', 'locMatch', 'availMatch', 'expMatch'];
  const axisLabels = ['Skills', 'Seniority', 'Location', 'Availability', 'Experience'];
  const cx = dims.w / 2;
  const cy = dims.h * 0.4;
  const r = Math.min(cx, cy) - 20;

  function pentPoint(angle, val) {
    const dist = (val / 100) * r;
    return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
  }

  const bgPoints = [];
  const dataPoints = [];
  for (let i = 0; i < 5; i++) {
    const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
    bgPoints.push(pentPoint(angle, 100));
    dataPoints.push(pentPoint(angle, score.axes[axes[i]]));
  }

  const bgPoly = bgPoints.map(p => `${p.x},${p.y}`).join(' ');
  const dataPoly = dataPoints.map(p => `${p.x},${p.y}`).join(' ');

  const axisLines = [];
  const axisLabelsEls = [];
  for (let i = 0; i < 5; i++) {
    const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
    const end = pentPoint(angle, 100);
    axisLines.push(React.createElement('line', {
      key: `ax${i}`,
      x1: cx, y1: cy, x2: end.x, y2: end.y,
      stroke: hovAxis === i ? 'rgba(255,255,255,0.3)' : 'var(--border)',
      strokeWidth: hovAxis === i ? 1.5 : 1,
      onMouseEnter: () => setHovAxis(i),
      onMouseLeave: () => setHovAxis(null),
      style: { cursor: 'crosshair' }
    }));
    const labelPt = pentPoint(angle, 115);
    axisLabelsEls.push(React.createElement('text', {
      key: `al${i}`,
      x: labelPt.x, y: labelPt.y,
      textAnchor: 'middle', dominantBaseline: 'middle',
      fill: hovAxis === i ? 'var(--text)' : 'var(--text-muted)',
      fontSize: '8', fontWeight: hovAxis === i ? '600' : '400',
      onMouseEnter: () => setHovAxis(i),
      onMouseLeave: () => setHovAxis(null),
      style: { cursor: 'pointer' }
    }, axisLabels[i]));
  }

  const gridLevels = [25, 50, 75, 100];
  const grids = gridLevels.map((lv, gi) => {
    const pts = [];
    for (let i = 0; i < 5; i++) {
      const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
      pts.push(pentPoint(angle, lv));
    }
    return React.createElement('polygon', { key: `g${gi}`, points: pts.map(p => `${p.x},${p.y}`).join(' '), fill: 'none', stroke: 'var(--border)', strokeWidth: 0.5 });
  });

  return React.createElement('div', { className: 'col', style: { flex: '1' } },
    React.createElement('div', { className: 'col-header' }, 'Match Radar'),
    React.createElement('div', { className: 'col-body', style: { display: 'flex', flexDirection: 'column' } },
      React.createElement('svg', { ref: svgRef, className: 'radar-svg', viewBox: `0 0 ${dims.w} ${dims.h * 0.5}`, style: { flex: '1' } },
        ...grids,
        ...axisLines,
        React.createElement('polygon', { points: bgPoly, fill: 'rgba(129,140,248,0.05)', stroke: 'var(--border)', strokeWidth: 1 }),
        React.createElement('polygon', { points: dataPoly, fill: 'rgba(129,140,248,0.25)', stroke: '#818cf8', strokeWidth: 1.5 }),
        ...axisLabelsEls
      ),
      hovAxis !== null && React.createElement('div', { className: 'radar-axis-tip' },
        React.createElement('strong', {}, axisLabels[hovAxis]),
        React.createElement('span', { style: { color: scoreColor(score.axes[axes[hovAxis]]) } },
          `${score.axes[axes[hovAxis]]}% \u2014 ${scoreVerdict(score.axes[axes[hovAxis]])}`
        )
      ),
      React.createElement('div', { style: { padding: '8px', overflowY: 'auto', flex: '1' } },
        axes.map((ax, i) => {
          const val = score.axes[ax];
          return React.createElement('div', { key: ax, className: 'score-bar' },
            React.createElement('span', { className: 'score-bar-label' }, axisLabels[i]),
            React.createElement('div', { className: 'score-bar-track' },
              React.createElement('div', { className: 'score-bar-fill', style: { width: `${val}%`, background: scoreColor(val) } })
            ),
            React.createElement('span', { className: 'score-bar-pct' }, `${val}%`),
            React.createElement('span', { className: 'score-bar-verdict', style: { color: scoreColor(val) } }, scoreVerdict(val))
          );
        }),
        React.createElement('div', { className: 'score-total' },
          React.createElement('span', {}, `Overall: ${score.total}%`),
          React.createElement('span', { style: { color: scoreColor(score.total) } }, scoreLabel(score.total))
        )
      )
    )
  );
}

        `${person.name} \u2192 ${position.title} at ${position.client}`
      ),
      React.createElement('span', { className: 'footer-match-score', style: { background: scoreColor(score.total), color: '#000' } }, `${score.total}%`),
      React.createElement('button', { className: 'footer-btn footer-btn-primary', onClick: () => setShowModal(true) }, 'Generate Email'),
      React.createElement('button', { className: 'footer-btn footer-btn-close', onClick: onClose }, '\u2715 Clear')
    );
  }

  return React.createElement('div', { className: 'modal-overlay', onClick: (e) => { if (e.target === e.currentTarget) setShowModal(false); } },
    React.createElement('div', { className: 'modal-content' },
      React.createElement('div', { className: 'modal-header' },
        React.createElement('h3', {}, 'Email Proposal'),
        React.createElement('button', { className: 'modal-close', onClick: () => setShowModal(false) }, '\u2715')
      ),
      React.createElement('div', { className: 'modal-body' }, emailTemplate),
      React.createElement('div', { className: 'modal-actions' },
        React.createElement('button', { className: 'footer-btn footer-btn-primary', onClick: handleCopy }, copied ? 'Copied! \u2713' : 'Copy to Clipboard'),
        React.createElement('button', { className: 'footer-btn footer-btn-close', onClick: () => setShowModal(false) }, 'Close')
      )
    )
  );
}

function App() {
  const data = window.__DATA__;
  const [proposedIds, setProposedIds] = useState([]);
  const [activeMatch, setActiveMatch] = useState(null);
  const [selectedPositionId, setSelectedPositionId] = useState(null);
  const [availDrillPath, setAvailDrillPath] = useState([]);
  const [hoveredPerson, setHoveredPerson] = useState(null);
  const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });

  const handleSelectPosition = useCallback((position, personId) => {
    const person = data.people.find(p => p.id === personId);
    if (!person) return;
    const score = matchScore(person, position);
    setActiveMatch({ person, position, score });
    setSelectedPositionId(position.id);
    if (!proposedIds.includes(personId)) setProposedIds([...proposedIds, personId]);
  }, [data.people, proposedIds]);

  const handleClearMatch = useCallback(() => {
    setActiveMatch(null);
    setSelectedPositionId(null);
  }, []);

  const handleHoverPerson = useCallback((person, e) => {
    setHoveredPerson(person);
    setTooltipPos({ x: e.clientX, y: e.clientY });
  }, []);

  const handleLeavePerson = useCallback(() => {
    setHoveredPerson(null);
  }, []);

  return React.createElement('div', { id: 'app' },
    React.createElement('header', { className: 'app-header' },
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 2 } },
        React.createElement('span', { className: 'header-eyebrow' }, 'EPAM Systems \u00b7 Resource Management'),
        React.createElement('h1', {}, 'Staffing Radar')
      ),
      React.createElement('div', { style: { color: 'var(--text-muted)', fontSize: '0.72rem', marginLeft: 8 } },
        `${data.people.length} people \u00b7 ${data.positions.filter(p => p.status === 'open').length} open positions`
      ),
      React.createElement('div', { className: 'header-badge' }, 'Portfolio Demo')
    ),
    React.createElement('div', { className: 'board' },
      React.createElement('div', { className: 'panel panel-left' },
        React.createElement('div', { className: 'columns' },
          React.createElement(AvailableColumn, {
            people: data.people,
            drillPath: availDrillPath,
            onNavigate: setAvailDrillPath,
            onHoverPerson: handleHoverPerson,
            onLeavePerson: handleLeavePerson
          }),
          React.createElement(ProposedColumn, {
            people: data.people,
            proposedIds,
            setProposedIds,
            selectedPosition: activeMatch ? activeMatch.position : null
          }),
          React.createElement(SunburstColumn, {
            people: data.people,
            drillPath: availDrillPath,
            onNavigate: setAvailDrillPath
          })
        )
      ),
      React.createElement('div', { className: 'panel panel-right' },
        React.createElement('div', { className: 'columns' },
          React.createElement(PositionsColumn, {
            positions: data.positions,
            onSelectPosition: handleSelectPosition,
            selectedPositionId
          }),
          React.createElement(RadarColumn, { activeMatch })
        )
      )
    ),
    activeMatch && React.createElement(EmailModal, { activeMatch, onClose: handleClearMatch }),
    React.createElement(PersonTooltip, { person: hoveredPerson, pos: tooltipPos })
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));
</script>
</body>
</html>
