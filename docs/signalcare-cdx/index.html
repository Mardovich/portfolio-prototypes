ay === \"18\") classes.push(\"today\");\n                      return `<button class=\"${classes.join(\" \")}\" type=\"button\" data-action=\"jump-agenda\">${day}</button>`;\n                    })\n                    .join(\"\")}\n                </div>\n              </div>\n              <div class=\"section-card\">\n                <h3>Upcoming highlights</h3>\n                <p>Your visits, reminders, and personal events live together on one schedule.</p>\n                <div class=\"timeline\">\n                  ${db.appointments\n                    .slice()\n                    .sort((left, right) => new Date(left.date) - new Date(right.date))\n                    .map(\n                      (item) => `\n                      <button class=\"list-row\" type=\"button\" data-action=\"open-appointment\" data-id=\"${item.id}\">\n                        <div class=\"row-topline\">\n                          <div class=\"row-title\">${item.title}</div>\n                          <div class=\"row-time\">${formatShortTime(item.date)}</div>\n                        </div>\n                        <div class=\"row-subline\">${item.location}</div>\n                      </button>\n                    `,\n                    )\n                    .join(\"\")}\n                </div>\n              </div>\n            </div>\n          `;\n        }\n\n        const grouped = db.appointments\n          .slice()\n          .sort((left, right) => new Date(left.date) - new Date(right.date))\n          .reduce((groups, item) => {\n            const key = formatDayLabel(item.date);\n            groups[key] = groups[key] || [];\n            groups[key].push(item);\n            return groups;\n          }, {});\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Today</div>\n                  <div class=\"value\">2 items need attention</div>\n                </div>\n                <span class=\"pill warning\">${counts().calendar} open alerts</span>\n              </div>\n              <div class=\"hero-stat-grid\">\n                <div class=\"hero-stat\">\n                  <strong>1</strong>\n                  <span>Visit to confirm</span>\n                </div>\n                <div class=\"hero-stat\">\n                  <strong>1</strong>\n                  <span>Schedule change</span>\n                </div>\n                <div class=\"hero-stat\">\n                  <strong>3</strong>\n                  <span>Upcoming touchpoints</span>\n                </div>\n              </div>\n              <div class=\"tab-row\">\n                <button class=\"chip-button active\" type=\"button\" data-action=\"set-calendar-view\" data-view=\"agenda\">Agenda</button>\n                <button class=\"chip-button\" type=\"button\" data-action=\"set-calendar-view\" data-view=\"month\">Month</button>\n              </div>\n            </div>\n            ${Object.entries(grouped)\n              .map(\n                ([day, items]) => `\n                  <div class=\"agenda-day\"><strong>${day}</strong></div>\n                  ${items\n                    .map(\n                      (item) => `\n                      <button class=\"list-row\" type=\"button\" data-action=\"open-appointment\" data-id=\"${item.id}\">\n                        <div class=\"row-topline\">\n                          <div class=\"row-title\">${item.title}</div>\n                          <div class=\"row-time\">${formatShortTime(item.date)}</div>\n                        </div>\n                        <div class=\"row-subline\">${item.location}</div>\n                        <div class=\"pill-row\">${relativeBadge(item.confirmation)}</div>\n                      </button>\n                    `,\n                    )\n                    .join(\"\")}\n                `,\n              )\n              .join(\"\")}\n          </div>\n        `;\n      }\n\n      function renderAppointmentDetail(route) {\n        const item = getAppointment(route.params.id);\n        if (!item) return renderMissing(\"Appointment not found\");\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"detail-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">${item.type === \"event\" ? \"Personal event\" : \"Care visit\"}</div>\n                  <div class=\"value\">${item.title}</div>\n                </div>\n                ${relativeBadge(item.confirmation)}\n              </div>\n              <p>${item.type === \"event\" ? \"Private self-care event\" : item.with}</p>\n              <div class=\"detail-grid\">\n                <div class=\"detail-item\">\n                  <strong>Date</strong>\n                  <span>${formatLongDate(item.date)}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Reminder</strong>\n                  <span>${item.reminder}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Location</strong>\n                  <span>${item.location}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Phone</strong>\n                  <span>${item.phone || \"Private\"}</span>\n                </div>\n              </div>\n              <p class=\"helper-copy\">${item.note}</p>\n              <div class=\"action-row\">\n                ${item.type === \"appointment\" ? `<button class=\"action-button\" type=\"button\" data-action=\"confirm-appointment\" data-id=\"${item.id}\">Confirm visit</button>` : \"\"}\n                ${item.type === \"appointment\" ? `<button class=\"tonal-button\" type=\"button\" data-action=\"open-request-appointment\" data-contact=\"${item.with}\">Reschedule</button>` : \"\"}\n                <button class=\"tonal-button\" type=\"button\" data-action=\"open-sheet\" data-sheet=\"map\" data-id=\"${item.id}\">Open map</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"open-sheet\" data-sheet=\"appointment-reminder\" data-id=\"${item.id}\">Change reminder</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"share-appointment\" data-id=\"${item.id}\">Share</button>\n              </div>\n            </div>\n          </div>\n        `;\n      }\n\n      function renderNewEvent() {\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"new-event\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"event-title\">Title</label>\n                  <input id=\"event-title\" class=\"text-input\" name=\"title\" value=\"Recovery walk\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"event-date\">Date and time</label>\n                  <input id=\"event-date\" class=\"text-input\" type=\"datetime-local\" name=\"date\" value=\"2026-04-19T14:00\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"event-location\">Location</label>\n                  <input id=\"event-location\" class=\"text-input\" name=\"location\" value=\"Riverside path\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"event-notes\">Notes</label>\n                  <textarea id=\"event-notes\" class=\"text-area\" name=\"notes\">20 minute walk after hydration and lunch.</textarea>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">Save event</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderRequestAppointment(route) {\n        const defaultRecipient = route.params.contact || \"Scheduling\";\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"request-appointment\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"request-recipient\">Send to</label>\n                  <input id=\"request-recipient\" class=\"text-input\" name=\"recipient\" value=\"${defaultRecipient}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"request-subject\">Subject</label>\n                  <input id=\"request-subject\" class=\"text-input\" name=\"subject\" value=\"Appointment request\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"request-body\">Message</label>\n                  <textarea id=\"request-body\" class=\"text-area\" name=\"body\">I would like to request a visit next week to review current symptoms and medication response.</textarea>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">Send request</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderMedication() {\n        const collection = state.medsTab === \"current\" ? db.medications.current : db.medications.history;\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Medication list</div>\n                  <div class=\"value\">${collection.length} ${state.medsTab === \"current\" ? \"active\" : \"historical\"} entries</div>\n                </div>\n                <span class=\"pill\">${db.reminders.length} reminders</span>\n              </div>\n              <div class=\"tab-row\">\n                <button class=\"chip-button ${state.medsTab === \"current\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-meds-tab\" data-tab=\"current\">Current</button>\n                <button class=\"chip-button ${state.medsTab === \"history\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-meds-tab\" data-tab=\"history\">History</button>\n              </div>\n              <p class=\"helper-copy\">Keep active and past medications separate for easier review.</p>\n            </div>\n            ${collection\n              .map(\n                (item) => `\n                  <button class=\"list-row\" type=\"button\" data-action=\"open-medication\" data-id=\"${item.id}\" data-collection=\"${state.medsTab}\">\n                    <div class=\"row-topline\">\n                      <div class=\"row-title\">${item.name} ${item.strength}</div>\n                      <div class=\"row-time\">${item.kind}</div>\n                    </div>\n                    <div class=\"row-subline\">${item.doctor}</div>\n                    <div class=\"row-meta\">${item.frequency}</div>\n                  </button>\n                `,\n              )\n              .join(\"\")}\n          </div>\n        `;\n      }\n\n      function renderMedicationDetail(route) {\n        const item = getMedication(route.params.id, route.params.collection);\n        if (!item) return renderMissing(\"Medication not found\");\n\n        const isHistory = route.params.collection === \"history\" || !db.medications.current.find((entry) => entry.id === item.id);\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"detail-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">${item.kind}</div>\n                  <div class=\"value\">${item.name}</div>\n                </div>\n                <span class=\"pill ${isHistory ? \"\" : \"success\"}\">${isHistory ? \"History\" : \"Current\"}</span>\n              </div>\n              <p>Also known as ${item.aliases}.</p>\n              <div class=\"detail-grid\">\n                <div class=\"detail-item\">\n                  <strong>Strength</strong>\n                  <span>${item.strength}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Dosage</strong>\n                  <span>${item.dosage}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Frequency</strong>\n                  <span>${item.frequency}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Start</strong>\n                  <span>${item.startDate}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Doctor</strong>\n                  <span>${item.doctor}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Pharmacy</strong>\n                  <span>${item.pharmacy}</span>\n                </div>\n              </div>\n              <p class=\"helper-copy\">${item.instructions}</p>\n              <p class=\"helper-copy\"><strong>Purpose:</strong> ${item.purpose}</p>\n              <div class=\"action-row\">\n                ${!isHistory ? `<button class=\"action-button\" type=\"button\" data-action=\"request-refill\" data-id=\"${item.id}\">Request refill</button>` : \"\"}\n                ${!isHistory ? `<button class=\"tonal-button\" type=\"button\" data-action=\"archive-medication\" data-id=\"${item.id}\">Move to history</button>` : `<button class=\"tonal-button\" type=\"button\" data-action=\"restore-medication\" data-id=\"${item.id}\">Restore to current</button>`}\n                <button class=\"tonal-button\" type=\"button\" data-action=\"open-reminder-editor\" data-id=\"${item.id}\">Manage reminders</button>\n              </div>\n            </div>\n            <div class=\"section-card\">\n              <h3>Drug information</h3>\n              <p>View regimen details, notes, and reference information in one place.</p>\n            </div>\n          </div>\n        `;\n      }\n\n      function renderMedicationAdd() {\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"medication-add\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"med-name\">Medication</label>\n                  <input id=\"med-name\" class=\"text-input\" name=\"name\" value=\"Dulcolax\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"med-strength\">Strength</label>\n                  <input id=\"med-strength\" class=\"text-input\" name=\"strength\" value=\"100 mg\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"med-frequency\">Frequency</label>\n                  <input id=\"med-frequency\" class=\"text-input\" name=\"frequency\" value=\"Every day as needed\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"med-purpose\">Purpose</label>\n                  <textarea id=\"med-purpose\" class=\"text-area\" name=\"purpose\">Used for symptom management between visits.</textarea>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">Add medication</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderDiary() {\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Diary</div>\n                  <div class=\"value\">Personal tracking and symptom memory</div>\n                </div>\n                <span class=\"pill warning\">${counts().diary} active symptoms</span>\n              </div>\n              <div class=\"tab-row\">\n                <button class=\"chip-button ${state.diaryTab === \"meds\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-diary-tab\" data-tab=\"meds\">Meds</button>\n                <button class=\"chip-button ${state.diaryTab === \"symptoms\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-diary-tab\" data-tab=\"symptoms\">Symptoms</button>\n                <button class=\"chip-button ${state.diaryTab === \"vitals\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-diary-tab\" data-tab=\"vitals\">Vitals</button>\n              </div>\n              <p class=\"helper-copy\">Switch between medication logs, symptom entries, and vitals check-ins.</p>\n            </div>\n            ${state.diaryTab === \"meds\" ? renderDiaryMeds() : \"\"}\n            ${state.diaryTab === \"symptoms\" ? renderDiarySymptoms() : \"\"}\n            ${state.diaryTab === \"vitals\" ? renderDiaryVitals() : \"\"}\n          </div>\n        `;\n      }\n\n      function renderDiaryMeds() {\n        return db.diary.meds\n          .map(\n            (item) => `\n            <div class=\"list-row\">\n              <div class=\"row-topline\">\n                <div class=\"row-title\">${item.title}</div>\n                <div class=\"row-time\">${item.status}</div>\n              </div>\n              <div class=\"row-subline\">${item.meta}</div>\n            </div>\n          `,\n          )\n          .join(\"\");\n      }\n\n      function renderDiarySymptoms() {\n        return db.diary.symptoms\n          .map(\n            (item) => `\n            <div class=\"list-row\">\n              <div class=\"row-topline\">\n                <div class=\"row-title\">${item.type}</div>\n                <div class=\"row-time\">${item.time}</div>\n              </div>\n              <div class=\"row-subline\">${item.summary}</div>\n              <div class=\"pill-row\"><span class=\"pill ${item.severity === \"high\" ? \"danger\" : item.severity === \"medium\" ? \"warning\" : \"success\"}\">${item.severity}</span></div>\n            </div>\n          `,\n          )\n          .join(\"\");\n      }\n\n      function renderDiaryVitals() {\n        const latest = db.diary.vitals[0];\n        return `\n          <div class=\"section-card\">\n            <div class=\"surface-header\">\n              <div>\n                <div class=\"caption\">${latest.time}</div>\n                <div class=\"value\">${latest.temperature.toFixed(1)} deg / ${latest.systolic}/${latest.diastolic}</div>\n              </div>\n              <span class=\"pill success\">${latest.weight.toFixed(1)} lb</span>\n            </div>\n            <div class=\"metric-grid\">\n              ${db.diary.vitals\n                .slice(0, 3)\n                .map(\n                  (item) => `\n                  <div class=\"metric-card\">\n                    <strong>${item.temperature.toFixed(1)} deg</strong>\n                    <span>${item.time}</span>\n                  </div>\n                `,\n                )\n                .join(\"\")}\n            </div>\n          </div>\n        `;\n      }\n\n      function renderDiaryAsNeeded() {\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"diary-as-needed\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"asmed-name\">Medication</label>\n                  <select id=\"asmed-name\" class=\"select-input\" name=\"name\">\n                    ${db.medications.current\n                      .map((item) => `<option value=\"${item.name} ${item.strength}\">${item.name} ${item.strength}</option>`)\n                      .join(\"\")}\n                  </select>\n                </div>\n                <div class=\"field\">\n                  <label for=\"asmed-amount\">Amount</label>\n                  <input id=\"asmed-amount\" class=\"text-input\" name=\"amount\" value=\"1 tablet\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"asmed-note\">Reason</label>\n                  <textarea id=\"asmed-note\" class=\"text-area\" name=\"note\">Used after pain rose above baseline.</textarea>\n                </div>\n              </div>\n              <div class=\"toggle-list\">\n                <label class=\"toggle-line\">\n                  <div>\n                    <strong>Set next-dose reminder</strong>\n                    <span>Create a reminder to safely take the next dose.</span>\n                  </div>\n                  <input type=\"checkbox\" name=\"nextDose\" checked />\n                </label>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">Log dose</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderSymptomEntry() {\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"symptom-entry\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"symptom-type\">Type</label>\n                  <select id=\"symptom-type\" class=\"select-input\" name=\"type\">\n                    <option>Pain</option>\n                    <option>Nausea</option>\n                    <option>Appetite</option>\n                    <option>Constipation</option>\n                    <option>Diarrhea</option>\n                    <option>Note</option>\n                  </select>\n                </div>\n                <div class=\"field\">\n                  <label>Severity</label>\n                  <div class=\"symptom-scale\">\n                    ${Array.from({ length: 11 }, (_, index) => `<button type=\"button\" class=\"${state.selectedPain === index ? \"active\" : \"\"}\" data-action=\"set-pain\" data-value=\"${index}\">${index}</button>`).join(\"\")}\n                  </div>\n                </div>\n                <div class=\"field\">\n                  <label for=\"symptom-body\">Summary</label>\n                  <textarea id=\"symptom-body\" class=\"text-area\" name=\"summary\">Shooting left-shoulder pain with increased tension after yesterday's scan.</textarea>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">Save symptom</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderVitalsEntry() {\n        const latest = db.diary.vitals[0];\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"vitals-entry\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"temp\">Temperature</label>\n                  <input id=\"temp\" class=\"text-input\" name=\"temperature\" type=\"number\" step=\"0.1\" value=\"${latest.temperature}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"sys\">Systolic</label>\n                  <input id=\"sys\" class=\"text-input\" name=\"systolic\" type=\"number\" value=\"${latest.systolic}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"dia\">Diastolic</label>\n                  <input id=\"dia\" class=\"text-input\" name=\"diastolic\" type=\"number\" value=\"${latest.diastolic}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"weight\">Weight</label>\n                  <input id=\"weight\" class=\"text-input\" name=\"weight\" type=\"number\" step=\"0.1\" value=\"${latest.weight}\" />\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">Save vitals</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderLabs() {\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Recent results</div>\n                  <div class=\"value\">${db.labs.length} panels available</div>\n                </div>\n                <span class=\"pill danger\">${counts().labs} abnormal markers</span>\n              </div>\n              <p class=\"helper-copy\">Review new results and send follow-up questions to your care team.</p>\n            </div>\n            ${db.labs\n              .map(\n                (panel) => `\n                  <button class=\"list-row\" type=\"button\" data-action=\"open-lab\" data-id=\"${panel.id}\">\n                    <div class=\"row-topline\">\n                      <div class=\"row-title\">${panel.title}</div>\n                      <div class=\"row-time\">${panel.date}</div>\n                    </div>\n                    <div class=\"row-subline\">${panel.summary}</div>\n                  </button>\n                `,\n              )\n              .join(\"\")}\n          </div>\n        `;\n      }\n\n      function renderLabDetail(route) {\n        const panel = getLab(route.params.id);\n        if (!panel) return renderMissing(\"Lab result not found\");\n\n        const primary = panel.tests[0];\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"detail-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">${panel.date}</div>\n                  <div class=\"value\">${panel.title}</div>\n                </div>\n                ${primary ? `<span class=\"pill ${primary.abnormal ? \"danger\" : \"success\"}\">${primary.abnormal ? \"Needs review\" : \"Stable\"}</span>` : '<span class=\"pill\">Imaging</span>'}\n              </div>\n              <p>${panel.summary}</p>\n              ${\n                primary\n                  ? `\n                    <div class=\"detail-grid\">\n                      <div class=\"detail-item\">\n                        <strong>${primary.code}</strong>\n                        <span>${primary.value} ${primary.unit}</span>\n                      </div>\n                      <div class=\"detail-item\">\n                        <strong>Range</strong>\n                        <span>${primary.range}</span>\n                      </div>\n                    </div>\n                    <div class=\"chart-card\">\n                      ${sparkline(primary.history, primary.abnormal)}\n                    </div>\n                    ${panel.tests\n                      .map(\n                        (test) => `\n                        <div class=\"list-row\">\n                          <div class=\"row-topline\">\n                            <div class=\"row-title\">${test.label}</div>\n                            <div class=\"row-time\">${test.value} ${test.unit}</div>\n                          </div>\n                          <div class=\"row-subline\">Normal range: ${test.range}</div>\n                        </div>\n                      `,\n                      )\n                      .join(\"\")}\n                  `\n                  : '<div class=\"section-card\"><p>Imaging narrative preview is available. Follow-up questions can still route directly to the care team.</p></div>'\n              }\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"button\" data-action=\"ask-about-lab\" data-id=\"${panel.id}\">Ask care team</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Back to labs</button>\n              </div>\n            </div>\n          </div>\n        `;\n      }\n\n      function renderMessages() {\n        const folder = db.messages[state.messageTab];\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Mailbox</div>\n                  <div class=\"value\">${folder.length} ${state.messageTab} messages</div>\n                </div>\n                <span class=\"pill warning\">${counts().messages} unread</span>\n              </div>\n              <div class=\"tab-row\">\n                <button class=\"chip-button ${state.messageTab === \"inbox\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-message-tab\" data-tab=\"inbox\">Inbox</button>\n                <button class=\"chip-button ${state.messageTab === \"sent\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-message-tab\" data-tab=\"sent\">Sent</button>\n                <button class=\"chip-button ${state.messageTab === \"trash\" ? \"active\" : \"\"}\" type=\"button\" data-action=\"set-message-tab\" data-tab=\"trash\">Trash</button>\n              </div>\n            </div>\n            ${\n              folder.length\n                ? folder\n                    .map(\n                      (item) => `\n                      <button class=\"thread-card\" type=\"button\" data-action=\"open-thread\" data-id=\"${item.id}\" data-folder=\"${state.messageTab}\">\n                        <div class=\"row-topline\">\n                          <div class=\"row-title\">${item.from}</div>\n                          <div class=\"row-time\">${item.time}</div>\n                        </div>\n                        <div class=\"thread-meta\"><strong>${item.subject}</strong></div>\n                        <div class=\"thread-preview\">${item.preview}</div>\n                        <div class=\"pill-row\">${item.unread ? '<span class=\"pill danger\">Unread</span>' : \"\"}</div>\n                      </button>\n                    `,\n                    )\n                    .join(\"\")\n                : '<div class=\"empty-state\">Nothing in this folder.</div>'\n            }\n          </div>\n        `;\n      }\n\n      function renderMessageThread(route) {\n        const thread = getMessage(route.params.id, route.params.folder);\n        if (!thread) return renderMissing(\"Message not found\");\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"detail-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">${thread.from}</div>\n                  <div class=\"value\">${thread.subject}</div>\n                </div>\n                <span class=\"pill\">${route.params.folder}</span>\n              </div>\n              <div class=\"timeline\">\n                ${thread.body\n                  .map((entry) => `<div class=\"thread-bubble ${entry.side}\">${entry.text}</div>`)\n                  .join(\"\")}\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"button\" data-action=\"reply-thread\" data-id=\"${thread.id}\">Reply</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Back</button>\n              </div>\n            </div>\n          </div>\n        `;\n      }\n\n      function renderComposeMessage(route) {\n        const defaults = route.params.defaults || {};\n\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"compose-message\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"compose-to\">To</label>\n                  <input id=\"compose-to\" class=\"text-input\" name=\"to\" value=\"${defaults.to || \"Office of Dr. Maya Rivera\"}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"compose-subject\">Subject</label>\n                  <input id=\"compose-subject\" class=\"text-input\" name=\"subject\" value=\"${defaults.subject || \"Question about treatment\"}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"compose-body\">Message</label>\n                  <textarea id=\"compose-body\" class=\"text-area\" name=\"body\">${defaults.body || \"I would like to ask a follow-up question about today's result and what to watch for before the next visit.\"}</textarea>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">Send</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderSearch() {\n        const query = state.activeSearchQuery;\n        const results = collectSearchResults(query);\n        const browseRows = [\n          [\"calendar\", \"Calendar\", \"Visits and personal events\"],\n          [\"medication\", \"Medications\", \"Current, historical, and refill tasks\"],\n          [\"messages\", \"Messages\", \"Inbox and sent communication\"],\n          [\"directory\", \"Directory\", \"Reachable care contacts\"],\n        ];\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Search</div>\n                  <div class=\"value\">${results.term ? `${results.total} matches` : \"Find tasks fast\"}</div>\n                </div>\n                ${results.term ? `<span class=\"pill\">${escapeHtml(query)}</span>` : '<span class=\"pill\">Across care data</span>'}\n              </div>\n              <form class=\"field-group\" data-submit=\"search\">\n                <div class=\"field\">\n                  <label for=\"global-search\">Search care information</label>\n                  <input id=\"global-search\" class=\"text-input\" name=\"query\" type=\"search\" placeholder=\"Appointments, labs, messages, contacts\" value=\"${escapeHtml(query)}\" />\n                </div>\n                <div class=\"action-row\">\n                  <button class=\"action-button\" type=\"submit\">Search</button>\n                  <button class=\"tonal-button\" type=\"button\" data-action=\"cancel-search\">${query ? \"Clear\" : \"Back\"}</button>\n                </div>\n              </form>\n            </div>\n            ${\n              results.total\n                ? `\n                  ${results.appointments.length ? `\n                    <div class=\"section-card\">\n                      <div class=\"surface-header\">\n                        <div>\n                          <div class=\"caption\">Appointments</div>\n                          <div class=\"value\">${results.appointments.length} matches</div>\n                        </div>\n                      </div>\n                      ${results.appointments\n                        .map(\n                          (item) => `\n                            <button class=\"list-row\" type=\"button\" data-action=\"open-appointment\" data-id=\"${item.id}\">\n                              <div class=\"row-topline\">\n                                <div class=\"row-title\">${item.title}</div>\n                                <div class=\"row-time\">${formatShortTime(item.date)}</div>\n                              </div>\n                              <div class=\"row-subline\">${item.location}</div>\n                            </button>\n                          `,\n                        )\n                        .join(\"\")}\n                    </div>\n                  ` : \"\"}\n                  ${results.labs.length ? `\n                    <div class=\"section-card\">\n                      <div class=\"surface-header\">\n                        <div>\n                          <div class=\"caption\">Labs</div>\n                          <div class=\"value\">${results.labs.length} matches</div>\n                        </div>\n                      </div>\n                      ${results.labs\n                        .map(\n                          (panel) => `\n                            <button class=\"list-row\" type=\"button\" data-action=\"open-lab\" data-id=\"${panel.id}\">\n                              <div class=\"row-topline\">\n                                <div class=\"row-title\">${panel.title}</div>\n                              </div>\n                              <div class=\"row-subline\">${panel.summary}</div>\n                            </button>\n                          `,\n                        )\n                        .join(\"\")}\n                    </div>\n                  ` : \"\"}\n                  ${results.messages.length ? `\n                    <div class=\"section-card\">\n                      <div class=\"surface-header\">\n                        <div>\n                          <div class=\"caption\">Messages</div>\n                          <div class=\"value\">${results.messages.length} matches</div>\n                        </div>\n                      </div>\n                      ${results.messages\n                        .map(\n                          (item) => `\n                            <button class=\"list-row\" type=\"button\" data-action=\"open-thread\" data-id=\"${item.id}\" data-folder=\"${item.folder}\">\n                              <div class=\"row-topline\">\n                                <div class=\"row-title\">${item.subject}</div>\n                                <div class=\"row-time\">${item.folder}</div>\n                              </div>\n                              <div class=\"row-subline\">${item.preview}</div>\n                            </button>\n                          `,\n                        )\n                        .join(\"\")}\n                    </div>\n                  ` : \"\"}\n                  ${results.contacts.length ? `\n                    <div class=\"section-card\">\n                      <div class=\"surface-header\">\n                        <div>\n                          <div class=\"caption\">Contacts</div>\n                          <div class=\"value\">${results.contacts.length} matches</div>\n                        </div>\n                      </div>\n                      ${results.contacts\n                        .map(\n                          (contact) => `\n                            <button class=\"list-row\" type=\"button\" data-action=\"open-contact\" data-id=\"${contact.id}\">\n                              <div class=\"row-topline\">\n                                <div class=\"row-title\">${contact.name}</div>\n                              </div>\n                              <div class=\"row-subline\">${contact.role}</div>\n                            </button>\n                          `,\n                        )\n                        .join(\"\")}\n                    </div>\n                  ` : \"\"}\n                `\n                : results.term\n                  ? '<div class=\"section-card\"><div class=\"empty-state\">No matches found. Try a different term or browse a module directly.</div></div>'\n                  : `\n                    <div class=\"section-card\">\n                      <div class=\"surface-header\">\n                        <div>\n                          <div class=\"caption\">Browse</div>\n                          <div class=\"value\">Jump into a module</div>\n                        </div>\n                      </div>\n                      ${browseRows\n                        .map(\n                          ([name, label, copy]) => `\n                            <button class=\"list-row\" type=\"button\" data-action=\"switch-top-level\" data-target=\"${name}\">\n                              <div class=\"row-topline\">\n                                <div class=\"row-title\">${label}</div>\n                              </div>\n                              <div class=\"row-subline\">${copy}</div>\n                            </button>\n                          `,\n                        )\n                        .join(\"\")}\n                    </div>\n                  `\n            }\n          </div>\n        `;\n      }\n\n      function renderDirectory() {\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Care contacts</div>\n                  <div class=\"value\">${db.directory.length} reachable profiles</div>\n                </div>\n              </div>\n              <p class=\"helper-copy\">Tap a contact to open office details, map access, or a new message.</p>\n            </div>\n            ${db.directory\n              .map(\n                (contact) => `\n                <button class=\"contact-card\" type=\"button\" data-action=\"open-contact\" data-id=\"${contact.id}\">\n                  <div class=\"row-topline\">\n                    <div class=\"row-title\">${contact.name}</div>\n                    <div class=\"row-time\">${contact.role}</div>\n                  </div>\n                  <span>${contact.office}</span>\n                  <span>${contact.address}</span>\n                </button>\n              `,\n              )\n              .join(\"\")}\n          </div>\n        `;\n      }\n\n      function renderContactDetail(route) {\n        const contact = getContact(route.params.id);\n        if (!contact) return renderMissing(\"Contact not found\");\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"detail-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">${contact.role}</div>\n                  <div class=\"value\">${contact.name}</div>\n                </div>\n                <div class=\"avatar-pill\">${contact.name.split(\" \").map((part) => part[0]).join(\"\").slice(0, 2)}</div>\n              </div>\n              <p>${contact.bio}</p>\n              <div class=\"detail-grid\">\n                <div class=\"detail-item\">\n                  <strong>Office</strong>\n                  <span>${contact.office}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Phone</strong>\n                  <span>${contact.phone}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Address</strong>\n                  <span>${contact.address}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Map</strong>\n                  <span>Open in bottom sheet</span>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"button\" data-action=\"message-contact\" data-id=\"${contact.id}\">Send message</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"open-sheet\" data-sheet=\"contact-map\" data-id=\"${contact.id}\">Open map</button>\n              </div>\n            </div>\n          </div>\n        `;\n      }\n\n      function renderReminders() {\n        return `\n          <div class=\"section-stack\">\n            <div class=\"section-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Active reminders</div>\n                  <div class=\"value\">${db.reminders.length} schedules</div>\n                </div>\n                <span class=\"pill success\">${db.settings.medicationSnooze} snooze</span>\n              </div>\n              <p class=\"helper-copy\">Reminder creation remains a dedicated system because it powers both the meds diary and appointment awareness.</p>\n            </div>\n            ${db.reminders\n              .map(\n                (item) => `\n                <button class=\"list-row\" type=\"button\" data-action=\"open-reminder\" data-id=\"${item.id}\">\n                  <div class=\"row-topline\">\n                    <div class=\"row-title\">${item.time}</div>\n                    <div class=\"row-time\">${item.repeat}</div>\n                  </div>\n                  <div class=\"row-subline\">${item.meds.join(\", \")}</div>\n                </button>\n              `,\n              )\n              .join(\"\")}\n          </div>\n        `;\n      }\n\n      function renderReminderEditor(route) {\n        const reminder = route.params.id ? getReminder(route.params.id) : null;\n        const meds = reminder ? reminder.meds.join(\", \") : \"Lisinopril 10 mg\";\n\n        return `\n          <div class=\"section-stack\">\n            <form class=\"detail-card\" data-submit=\"reminder-editor\" data-reminder-id=\"${reminder ? reminder.id : \"\"}\">\n              <div class=\"field-group\">\n                <div class=\"field\">\n                  <label for=\"rem-time\">Time</label>\n                  <input id=\"rem-time\" class=\"text-input\" name=\"time\" value=\"${reminder ? reminder.time : \"8:30 PM\"}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"rem-repeat\">Repeat</label>\n                  <input id=\"rem-repeat\" class=\"text-input\" name=\"repeat\" value=\"${reminder ? reminder.repeat : \"Every day\"}\" />\n                </div>\n                <div class=\"field\">\n                  <label for=\"rem-meds\">Medication list</label>\n                  <textarea id=\"rem-meds\" class=\"text-area\" name=\"meds\">${meds}</textarea>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"submit\">${reminder ? \"Save reminder\" : \"Create reminder\"}</button>\n                ${reminder ? `<button class=\"tonal-button\" type=\"button\" data-action=\"delete-reminder\" data-id=\"${reminder.id}\">Delete</button>` : \"\"}\n                <button class=\"tonal-button\" type=\"button\" data-action=\"go-back\">Cancel</button>\n              </div>\n            </form>\n          </div>\n        `;\n      }\n\n      function renderReports() {\n        const include = db.report.include;\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"detail-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Report builder</div>\n                  <div class=\"value\">Generate a care summary PDF</div>\n                </div>\n                <span class=\"pill\">${include.length} sections</span>\n              </div>\n              <p>Your health report keeps appointments, symptoms, meds, and labs in one handoff artifact for care conversations.</p>\n              <div class=\"detail-grid\">\n                <div class=\"detail-item\">\n                  <strong>Start</strong>\n                  <span>${db.report.startDate}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>End</strong>\n                  <span>${db.report.endDate}</span>\n                </div>\n              </div>\n              <div class=\"checkbox-list\">\n                ${[\n                  [\"symptoms\", \"Symptom diary\"],\n                  [\"meds\", \"Medication list\"],\n                  [\"vitals\", \"Vitals diary\"],\n                  [\"labs\", \"Labs and tests\"],\n                  [\"appointments\", \"Appointments\"],\n                ]\n                  .map(\n                    ([key, label]) => `\n                    <label class=\"checkbox-line\">\n                      <div>\n                        <strong>${label}</strong>\n                        <span>Include this section in the PDF</span>\n                      </div>\n                      <input type=\"checkbox\" data-action=\"toggle-report\" data-key=\"${key}\" ${include.includes(key) ? \"checked\" : \"\"} />\n                    </label>\n                  `,\n                  )\n                  .join(\"\")}\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"button\" data-action=\"generate-report\">Generate PDF</button>\n                ${state.reportGenerated ? '<button class=\"tonal-button\" type=\"button\" data-action=\"open-sheet\" data-sheet=\"share-report\">Share</button>' : \"\"}\n              </div>\n            </div>\n            ${\n              state.reportGenerated\n                ? `\n                <div class=\"report-preview\">\n                  <div class=\"surface-header\">\n                    <div>\n                      <div class=\"caption\">Preview</div>\n                      <div class=\"value\">Patient report for ${db.patient.name}</div>\n                    </div>\n                    <span class=\"pill success\">Ready</span>\n                  </div>\n                  ${reportPreviewDocument(\"pdf-sheet\", include)}\n                </div>\n              `\n                : \"\"\n            }\n          </div>\n        `;\n      }\n\n      function renderSettings() {\n        const s = db.settings;\n\n        return `\n          <div class=\"section-stack\">\n            <div class=\"detail-card\">\n              <div class=\"surface-header\">\n                <div>\n                  <div class=\"caption\">Device and notification defaults</div>\n                  <div class=\"value\">Settings</div>\n                </div>\n              </div>\n              <div class=\"toggle-list\">\n                <label class=\"toggle-line\">\n                  <div>\n                    <strong>Use offline passcode</strong>\n                    <span>Faster login and subway-safe access.</span>\n                  </div>\n                  <input type=\"checkbox\" data-action=\"toggle-setting\" data-key=\"usePasscode\" ${s.usePasscode ? \"checked\" : \"\"} />\n                </label>\n                <label class=\"toggle-line\">\n                  <div>\n                    <strong>Calendar syncing</strong>\n                    <span>Mirror visit blocks into the device calendar.</span>\n                  </div>\n                  <input type=\"checkbox\" data-action=\"toggle-setting\" data-key=\"calendarSync\" ${s.calendarSync ? \"checked\" : \"\"} />\n                </label>\n                <label class=\"toggle-line\">\n                  <div>\n                    <strong>Lab notifications</strong>\n                    <span>Receive banner updates for new result panels.</span>\n                  </div>\n                  <input type=\"checkbox\" data-action=\"toggle-setting\" data-key=\"labsNotifications\" ${s.labsNotifications ? \"checked\" : \"\"} />\n                </label>\n                <label class=\"toggle-line\">\n                  <div>\n                    <strong>Message notifications</strong>\n                    <span>Keep the inbox routed back into active work.</span>\n                  </div>\n                  <input type=\"checkbox\" data-action=\"toggle-setting\" data-key=\"messageNotifications\" ${s.messageNotifications ? \"checked\" : \"\"} />\n                </label>\n                <label class=\"toggle-line\">\n                  <div>\n                    <strong>Vitals reminder</strong>\n                    <span>${s.vitalsReminder}</span>\n                  </div>\n                  <input type=\"checkbox\" data-action=\"toggle-setting\" data-key=\"vitalsReminderEnabled\" ${s.vitalsReminderEnabled ? \"checked\" : \"\"} />\n                </label>\n              </div>\n              <div class=\"divider\"></div>\n              <div class=\"detail-grid\">\n                <div class=\"detail-item\">\n                  <strong>Default reminder</strong>\n                  <span>${s.defaultReminder}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Tone</strong>\n                  <span>${s.tones}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Medication snooze</strong>\n                  <span>${s.medicationSnooze}</span>\n                </div>\n                <div class=\"detail-item\">\n                  <strong>Symptom reminder</strong>\n                  <span>${s.symptomReminderEnabled ? s.symptomReminder : \"Off\"}</span>\n                </div>\n              </div>\n              <div class=\"action-row\">\n                <button class=\"action-button\" type=\"button\" data-action=\"simulate-passcode-change\">Change passcode</button>\n                <button class=\"tonal-button\" type=\"button\" data-action=\"logout\">Log out</button>\n              </div>\n            </div>\n          </div>\n        `;\n      }\n\n      function renderMissing(label) {\n        return `<div class=\"section-stack\"><div class=\"empty-state\">${label}</div></div>`;\n      }\n\n      function renderFab(route) {\n        if (!state.authenticated) return \"\";\n\n        const topLevel = topLevelForRoute(route.name);\n        const actions = {\n          calendar: [\"calendar-actions\", \"Add or request\"],\n          medication: [\"med-actions\", \"Add medication\"],\n          diary: [state.diaryTab === \"meds\" ? \"go-as-needed\" : state.diaryTab === \"symptoms\" ? \"go-symptom\" : \"go-vitals\", state.diaryTab === \"meds\" ? \"Log dose\" : state.diaryTab === \"symptoms\" ? \"Add symptom\" : \"Log vitals\"],\n          labs: [\"compose-lab-question\", \"Ask question\"],\n          messages: [\"compose-message\", \"Compose\"],\n          reminders: [\"new-reminder\", \"New reminder\"],\n        }[topLevel];\n\n        if (!actions || !isTopLevel(route.name)) return \"\";\n\n        return `\n          <button class=\"fab\" type=\"button\" data-action=\"${actions[0]}\" aria-label=\"${actions[1]}\">\n            ${icon(\"plus\")}\n            <span>${actions[1]}</span>\n          </button>\n        `;\n      }\n\n      function renderBottomNav() {\n        if (!showBottomNav()) return \"\";\n\n        const current = currentRoute().name;\n        const active = topLevelForRoute(current);\n        const badgeCounts = counts();\n        const items = [\n          [\"calendar\", \"Calendar\", \"calendar\", badgeCounts.calendar],\n          [\"medication\", \"Meds\", \"meds\", 0],\n          [\"diary\", \"Diary\", \"diary\", badgeCounts.diary],\n          [\"labs\", \"Labs\", \"labs\", badgeCounts.labs],\n          [\"messages\", \"Messages\", \"message\", badgeCounts.messages],\n        ];\n\n        return `\n          <nav class=\"bottom-nav\" aria-label=\"Primary navigation\">\n            ${items\n              .map(\n                ([name, label, glyph, badge]) => `\n                  <button class=\"nav-item ${active === name ? \"active\" : \"\"}\" type=\"button\" data-action=\"switch-top-level\" data-target=\"${name}\">\n                    ${icon(glyph)}\n                    <span>${label}</span>\n                    ${badge ? `<span class=\"badge\">${badge}</span>` : \"\"}\n                  </button>\n                `,\n              )\n              .join(\"\")}\n          </nav>\n        `;\n      }\n\n      function renderDrawer() {\n        if (!state.authenticated) return \"\";\n\n        const active = topLevelForRoute(currentRoute().name);\n        const badgeCounts = counts();\n\n        return `\n          <div class=\"drawer ${state.drawerOpen ? \"visible\" : \"\"}\">\n            <button class=\"scrim ${state.drawerOpen ? \"visible\" : \"\"}\" type=\"button\" data-action=\"close-drawer\" aria-label=\"Close navigation drawer\"></button>\n            <div class=\"drawer-panel\">\n              <div class=\"drawer-user\">\n                <strong>${db.patient.name}</strong>\n                <span>${db.patient.program}</span>\n                <span>${db.patient.status}</span>\n              </div>\n              <div class=\"drawer-section-title\">Care tools</div>\n              <div class=\"drawer-list\">\n                ${[\n                  [\"directory\", \"Directory\", 0],\n                  [\"reminders\", \"Reminders\", badgeCounts.reminders],\n                  [\"reports\", \"Reports\", 0],\n                  [\"settings\", \"Settings\", 0],\n                ]\n                  .map(\n                    ([name, label, badge]) => `\n                      <button class=\"drawer-item ${active === name ? \"active\" : \"\"}\" type=\"button\" data-action=\"switch-top-level\" data-target=\"${name}\">\n                        <span>${label}</span>\n                        ${badge ? `<span class=\"badge\">${badge}</span>` : \"\"}\n                      </button>\n                    `,\n                  )\n                  .join(\"\")}\n              </div>\n              <div class=\"drawer-section-title\">Primary routes</div>\n              <div class=\"drawer-list\">\n                ${[\n                  [\"calendar\", \"Calendar\", badgeCounts.calendar],\n                  [\"medication\", \"Medications\", 0],\n                  [\"diary\", \"Diary\", badgeCounts.diary],\n                  [\"labs\", \"Labs & tests\", badgeCounts.labs],\n                  [\"messages\", \"Messages\", badgeCounts.messages],\n                ]\n                  .map(\n                    ([name, label, badge]) => `\n                      <button class=\"drawer-item ${active === name ? \"active\" : \"\"}\" type=\"button\" data-action=\"switch-top-level\" data-target=\"${name}\">\n                        <span>${label}</span>\n                        ${badge ? `<span class=\"badge\">${badge}</span>` : \"\"}\n                      </button>\n                    `,\n                  )\n                  .join(\"\")}\n              </div>\n              <div class=\"drawer-section-title\">Utilities</div>\n              <div class=\"drawer-list\">\n                <button class=\"drawer-item\" type=\"button\" data-action=\"logout\"><span>Log out</span></button>\n              </div>\n            </div>\n          </div>\n        `;\n      }\n\n      function renderSheet() {\n        if (!state.sheet) return \"\";\n\n        if (state.sheet.type === \"calendar-actions\") {\n          return `\n            <div class=\"sheet visible\">\n              <button class=\"scrim visible\" type=\"button\" data-action=\"close-sheet\" aria-label=\"Close sheet\"></button>\n              <div class=\"sheet-panel\">\n                <div class=\"sheet-handle\"></div>\n                <div class=\"sheet-stack\">\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"go-new-event\">\n                    <strong>Add self-care event</strong>\n                    <span>Create a private calendar block for recovery or preparation.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"go-request-appointment\">\n                    <strong>Request a visit</strong>\n                    <span>Route a scheduling request directly into the message flow.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"new-reminder\">\n                    <strong>Create reminder</strong>\n                    <span>Set up a routine prompt without leaving context.</span>\n                  </button>\n                </div>\n              </div>\n            </div>\n          `;\n        }\n\n        if (state.sheet.type === \"med-actions\") {\n          return `\n            <div class=\"sheet visible\">\n              <button class=\"scrim visible\" type=\"button\" data-action=\"close-sheet\" aria-label=\"Close sheet\"></button>\n              <div class=\"sheet-panel\">\n                <div class=\"sheet-handle\"></div>\n                <div class=\"sheet-stack\">\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"go-med-add\">\n                    <strong>Add home medication</strong>\n                    <span>Capture a new self-managed medication.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"restore-first-history\">\n                    <strong>Restore from history</strong>\n                    <span>Re-activate a previous medication entry.</span>\n                  </button>\n                </div>\n              </div>\n            </div>\n          `;\n        }\n\n        if (state.sheet.type === \"appointment-reminder\") {\n          const item = getAppointment(state.sheet.payload.id);\n          return `\n            <div class=\"sheet visible\">\n              <button class=\"scrim visible\" type=\"button\" data-action=\"close-sheet\" aria-label=\"Close sheet\"></button>\n              <div class=\"sheet-panel\">\n                <div utton class=\"scrim visible\" type=\"button\" data-action=\"close-sheet\" aria-label=\"Close sheet\"></button>\n              <div class=\"sheet-panel\">\n                <div class=\"sheet-handle\"></div>\n                <div class=\"sheet-card\">\n                  <h3>${contact.name}</h3>\n                  <p>${contact.address}</p>\n                  <div class=\"map-preview\">\n                    ${mapPreviewGraphic()}\n                  </div>\n                  <div class=\"action-row\">\n                    <button class=\"action-button\" type=\"button\" data-action=\"share-map\">Open external maps</button>\n                    <button class=\"tonal-button\" type=\"button\" data-action=\"close-sheet\">Close</button>\n                  </div>\n                </div>\n              </div>\n            </div>\n          `;\n        }\n\n        if (state.sheet.type === \"share-appointment\") {\n          const item = getAppointment(state.sheet.payload.id);\n          return `\n            <div class=\"sheet visible\">\n              <button class=\"scrim visible\" type=\"button\" data-action=\"close-sheet\" aria-label=\"Close sheet\"></button>\n              <div class=\"sheet-panel\">\n                <div class=\"sheet-handle\"></div>\n                <div class=\"sheet-stack\">\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"share-appointment-option\" data-channel=\"Messages\">\n                    <strong>Share to messages</strong>\n                    <span>Send visit details into a patient-safe thread.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"share-appointment-option\" data-channel=\"Email\">\n                    <strong>Send by email</strong>\n                    <span>Email ${item ? item.title : \"appointment\"} details.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"share-appointment-option\" data-channel=\"Calendar\">\n                    <strong>Add to calendar</strong>\n                    <span>Mirror the visit into the device calendar.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"share-appointment-option\" data-channel=\"Copy\">\n                    <strong>Copy details</strong>\n                    <span>Copy the appointment summary for another app.</span>\n                  </button>\n                </div>\n              </div>\n            </div>\n          `;\n        }\n\n        if (state.sheet.type === \"share-report\") {\n          return `\n            <div class=\"sheet visible\">\n              <button class=\"scrim visible\" type=\"button\" data-action=\"close-sheet\" aria-label=\"Close sheet\"></button>\n              <div class=\"sheet-panel\">\n                <div class=\"sheet-handle\"></div>\n                <div class=\"sheet-stack\">\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"share-report\" data-channel=\"Email\">\n                    <strong>Email PDF</strong>\n                    <span>Attach the generated report to a secure outbound message.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"share-report\" data-channel=\"Fax\">\n                    <strong>Fax summary</strong>\n                    <span>Legacy but still realistic for clinic handoffs.</span>\n                  </button>\n                  <button class=\"sheet-option\" type=\"button\" data-action=\"share-report\" data-channel=\"Download\">\n                    <strong>Download copy</strong>\n                    <span>Save a local PDF for later sharing.</span>\n                  </button>\n                </div>\n              </div>\n            </div>\n          `;\n        }\n\n        return \"\";\n      }\n\n      function renderSnackbar() {\n        if (!state.snackbar) return \"\";\n        return `\n          <div class=\"snackbar\" aria-live=\"polite\">\n            <strong>${state.snackbar.title}</strong>\n            ${state.snackbar.body ? `<span>${state.snackbar.body}</span>` : \"\"}\n          </div>\n        `;\n      }\n\n      function renderMain(route) {\n        const content = {\n          calendar: renderCalendar(),\n          \"appointment-detail\": renderAppointmentDetail(route),\n          \"new-event\": renderNewEvent(),\n          \"request-appointment\": renderRequestAppointment(route),\n          medication: renderMedication(),\n          \"medication-detail\": renderMedicationDetail(route),\n          \"medication-add\": renderMedicationAdd(),\n          diary: renderDiary(),\n          \"diary-as-needed\": renderDiaryAsNeeded(),\n          \"symptom-entry\": renderSymptomEntry(),\n          \"vitals-entry\": renderVitalsEntry(),\n          labs: renderLabs(),\n          \"lab-detail\": renderLabDetail(route),\n          messages: renderMessages(),\n          \"message-thread\": renderMessageThread(route),\n          \"compose-message\": renderComposeMessage(route),\n          search: renderSearch(),\n          directory: renderDirectory(),\n          \"contact-detail\": renderContactDetail(route),\n          reminders: renderReminders(),\n          \"reminder-editor\": renderReminderEditor(route),\n          reports: renderReports(),\n          settings: renderSettings(),\n        }[route.name];\n\n        return `\n          <div class=\"screen\">\n            ${renderStatusBar()}\n            ${renderTopAppBar(route)}\n            <div class=\"screen-body ${showBottomNav() ? \"\" : \"no-nav\"}\">${content}</div>\n            ${renderFab(route)}\n            ${renderBottomNav()}\n          </div>\n          ${renderDrawer()}\n          ${renderSheet()}\n          ${renderSnackbar()}\n        `;\n      }\n\n      function render() {\n        const route = currentRoute();\n        appRoot.innerHTML = state.authenticated ? renderMain(route) : renderAuth(route);\n      }\n\n      document.body.addEventListener(\"click\", (event) => {\n        const button = event.target.closest(\"button\");\n        if (!button) return;\n\n        const globalAction = button.dataset.globalAction;\n        if (globalAction === \"reset-prototype\") {\n          resetPrototype(true);\n          return;\n        }\n\n        if (globalAction === \"jump-home\") {\n          loginToHome();\n          return;\n        }\n\n        const action = button.dataset.action;\n        if (!action) return;\n\n        if (action === \"go-back\") {\n          goBack();\n          return;\n        }\n\n        if (action === \"open-drawer\") {\n          state.drawerOpen = true;\n          render();\n          return;\n        }\n\n        if (action === \"close-drawer\") {\n          state.drawerOpen = false;\n          render();\n          return;\n        }\n\n        if (action === \"close-sheet\") {\n          closeSheet();\n          return;\n        }\n\n        if (action === \"quick-search\") {\n          navigate(\"search\", { query: state.activeSearchQuery });\n          return;\n        }\n\n        if (action === \"cancel-search\") {\n          if (currentRoute().name === \"search\" && state.activeSearchQuery) {\n            state.activeSearchQuery = \"\";\n            replace(\"search\", { query: \"\" });\n            return;\n          }\n          state.activeSearchQuery = \"\";\n          goBack();\n          return;\n        }\n\n        if (action === \"fill-demo-login\") {\n          const username = document.getElementById(\"username\");\n          const password = document.getElementById(\"password\");\n          if (username) username.value = db.patient.username;\n          if (password) password.value = \"signalcare\";\n          return;\n        }\n\n        if (action === \"forgot-passcode-help\") {\n          showSnackbar(\"Need help?\", \"Use your account password or contact support if you cannot sign in.\");\n          return;\n        }\n\n        if (action === \"skip-to-home\") {\n          loginToHome();\n          return;\n        }\n\n        if (action === \"accept-legal\") {\n          replace(\"passcode-setup\");\n          return;\n        }\n\n        if (action === \"skip-passcode\") {\n          db.settings.usePasscode = false;\n          loginToHome();\n          showSnackbar(\"Password login selected\", \"Offline mode stays disabled until a passcode is set in settings.\");\n          return;\n        }\n\n        if (action === \"return-to-username\") {\n          resetPrototype(true);\n          return;\n        }\n\n        if (action === \"passcode-digit\") {\n          const digit = button.dataset.digit;\n          const route = currentRoute().name;\n          if (route === \"passcode-setup\") {\n            if (state.pendingPasscode.length < 4) state.pendingPasscode += digit;\n            if (state.pendingPasscode.length === 4) {\n              window.setTimeout(() => replace(\"passcode-confirm\"), 180);\n            }\n          } else if (route === \"passcode-confirm\") {\n            if (state.confirmPasscode.length < 4) state.confirmPasscode += digit;\n            if (state.confirmPasscode.length === 4) {\n              if (state.confirmPasscode === state.pendingPasscode) {\n                state.passcode = state.pendingPasscode;\n                db.settings.usePasscode = true;\n                loginToHome();\n                showSnackbar(\"Offline passcode enabled\", \"You can now use fast return login and offline viewing.\");\n                return;\n              }\n              state.confirmPasscode = \"\";\n              showSnackbar(\"Passcodes did not match\", \"Try the confirmation step again.\");\n            }\n          } else if (route === \"passcode-login\") {\n            if (state.pendingPasscode.length < 4) state.pendingPasscode += digit;\n            if (state.pendingPasscode.length === 4) {\n              if (state.pendingPasscode === state.passcode) {\n                state.pendingPasscode = \"\";\n                loginToHome();\n                showSnackbar(\"Welcome back\", \"Returned using the saved offline passcode.\");\n                return;\n              }\n              state.pendingPasscode = \"\";\n              showSnackbar(\"Incorrect passcode\", \"Re-enter the 4-digit code or fall back to account password.\");\n            }\n          }\n\n          render();\n          return;\n        }\n\n        if (action === \"passcode-delete\") {\n          const route = currentRoute().name;\n          if (route === \"passcode-setup\") state.pendingPasscode = state.pendingPasscode.slice(0, -1);\n          if (route === \"passcode-confirm\") state.confirmPasscode = state.confirmPasscode.slice(0, -1);\n          if (route === \"passcode-login\") state.pendingPasscode = state.pendingPasscode.slice(0, -1);\n          render();\n          return;\n        }\n\n        if (action === \"passcode-clear\") {\n          if (currentRoute().name === \"passcode-login\") {\n            resetPrototype(true);\n            return;\n          }\n          state.pendingPasscode = \"\";\n          state.confirmPasscode = \"\";\n          render();\n          return;\n        }\n\n        if (action === \"switch-top-level\") {\n          switchTopLevel(button.dataset.target);\n          return;\n        }\n\n        if (action === \"set-calendar-view\") {\n          state.calendarView = button.dataset.view;\n          render();\n          return;\n        }\n\n        if (action === \"jump-agenda\") {\n          state.calendarView = \"agenda\";\n          render();\n          return;\n        }\n\n        if (action === \"open-appointment\") {\n          navigate(\"appointment-detail\", { id: button.dataset.id });\n          return;\n        }\n\n        if (action === \"confirm-appointment\") {\n          const item = getAppointment(button.dataset.id);\n          if (item) item.confirmation = \"confirmed\";\n          showSnackbar(\"Appointment confirmed\", \"Confirmation was recorded in the calendar flow.\");\n          return;\n        }\n\n        if (action === \"open-request-appointment\") {\n          navigate(\"request-appointment\", { contact: button.dataset.contact || \"Scheduling\" });\n          return;\n        }\n\n        if (action === \"open-sheet\") {\n          openSheet(button.dataset.sheet, { id: button.dataset.id });\n          return;\n        }\n\n        if (action === \"share-appointment\") {\n          openSheet(\"share-appointment\", { id: button.dataset.id });\n          return;\n        }\n\n        if (action === \"share-appointment-option\") {\n          closeSheet();\n          showSnackbar(`Shared via ${button.dataset.channel}`, \"Appointment details are ready to hand off.\");\n          return;\n        }\n\n        if (action === \"share-map\") {\n          closeSheet();\n          showSnackbar(\"Opening Maps\", \"The location preview can hand off to the device maps app.\");\n          return;\n        }\n\n        if (action === \"set-appointment-reminder\") {\n          const item = getAppointment(button.dataset.id);\n          if (item) item.reminder = button.dataset.reminder;\n          closeSheet();\n          showSnackbar(\"Reminder updated\", `This visit now alerts ${button.dataset.reminder.toLowerCase()}.`);\n          return;\n        }\n\n        if (action === \"calendar-actions\") {\n          openSheet(\"calendar-actions\");\n          return;\n        }\n\n        if (action === \"go-new-event\") {\n          navigate(\"new-event\");\n          return;\n        }\n\n        if (action === \"go-request-appointment\") {\n          navigate(\"request-appointment\", { contact: \"Scheduling\" });\n          return;\n        }\n\n        if (action === \"set-meds-tab\") {\n          state.medsTab = button.dataset.tab;\n          render();\n          return;\n        }\n\n        if (action === \"open-medication\") {\n          navigate(\"medication-detail\", { id: button.dataset.id, collection: button.dataset.collection });\n          return;\n        }\n\n        if (action === \"med-actions\") {\n          openSheet(\"med-actions\");\n          return;\n        }\n\n        if (action === \"go-med-add\") {\n          navigate(\"medication-add\");\n          return;\n        }\n\n        if (action === \"restore-first-history\") {\n          const item = db.medications.history.shift();\n          if (item) db.medications.current.unshift(item);\n          closeSheet();\n          showSnackbar(\"Medication restored\", item ? `${item.name} returned to the current list.` : \"No historical medication available.\");\n          return;\n        }\n\n        if (action === \"request-refill\") {\n          const med = getMedication(button.dataset.id);\n          navigate(\"compose-message\", {\n            defaults: {\n              to: `Office of ${med.doctor}`,\n              subject: `${med.name} refill request`,\n              body: `I would like to request another prescription for ${med.name} ${med.strength}, ${med.dosage.toLowerCase()} ${med.frequency.toLowerCase()}.`,\n            },\n          });\n          return;\n        }\n\n        if (action === \"archive-medication\") {\n          const index = db.medications.current.findIndex((item) => item.id === button.dataset.id);\n          if (index >= 0) {\n            const [item] = db.medications.current.splice(index, 1);\n            item.endDate = \"2026-04-14\";\n            db.medications.history.unshift(item);\n            state.stack = [{ name: \"medication\", params: {} }];\n            showSnackbar(\"Moved to history\", `${item.name} is now archived.`);\n            return;\n          }\n        }\n\n        if (action === \"restore-medication\") {\n          const index = db.medications.history.findIndex((item) => item.id === button.dataset.id);\n          if (index >= 0) {\n            const [item] = db.medications.history.splice(index, 1);\n            db.medications.current.unshift(item);\n            state.stack = [{ name: \"medication\", params: {} }];\n            showSnackbar(\"Restored medication\", `${item.name} is active again.`);\n            return;\n          }\n        }\n\n        if (action === \"open-reminder-editor\") {\n          navigate(\"reminder-editor\", { id: db.reminders[0] ? db.reminders[0].id : \"\", medId: button.dataset.id });\n          return;\n        }\n\n        if (action === \"set-diary-tab\") {\n          state.diaryTab = button.dataset.tab;\n          render();\n          return;\n        }\n\n        if (action === \"go-as-needed\") {\n          navigate(\"diary-as-needed\");\n          return;\n        }\n\n        if (action === \"go-symptom\") {\n          navigate(\"symptom-entry\");\n          return;\n        }\n\n        if (action === \"go-vitals\") {\n          navigate(\"vitals-entry\");\n          return;\n        }\n\n        if (action === \"set-pain\") {\n          state.selectedPain = Number(button.dataset.value);\n          render();\n          return;\n        }\n\n        if (action === \"open-lab\") {\n          const lab = getLab(button.dataset.id);\n          navigate(\"lab-detail\", { id: button.dataset.id, title: lab ? lab.title : \"Lab detail\" });\n          return;\n        }\n\n        if (action === \"ask-about-lab\") {\n          const lab = getLab(button.dataset.id);\n          navigate(\"compose-message\", {\n            defaults: {\n              to: \"Office of Dr. Maya Rivera\",\n              subject: `${lab.title} follow-up`,\n              body: `Could you help me understand the latest ${lab.title.toLowerCase()} results and whether I should monitor anything before the next visit?`,\n            },\n          });\n          return;\n        }\n\n        if (action === \"compose-lab-question\") {\n          navigate(\"compose-message\", {\n            defaults: {\n
