          clearTimeout(timerId) {

          if (notifications.length > 0) {

            clearedAt = 0;

            return false;
          } else {
            if (!clearedAt) clearedAt = Date.now();
            if (Date.now() - clearedAt >= 180) return true;

          await wait(100);

           through the iframe boundary and scrolled the WordPress parent. */
        try {

          while (scrollParent) {
            var style = getComputedStyle(scrollParent);
            var overflow = style.overflowY || style.overflow;
            if (overflow === "auto" || overflow === "scroll") break;

      function syncToastStackHeight(attempt = 0) {
        const hasToasts = toastRail.childElementCount > 0;
        const layoutGap = hasToasts
          ? Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--layout-gap")) || 0
          : 0;
        const nextHeight = hasToasts ? Math.ceil(toastRail.getBoundingClientRect().height + layoutGap) : 0;
        const currentHeight = Number.parseFloat(document.body.style.getPropertyValue("--toast-stack-height")) || 0;

        document.body.style.setProperty("--toast-stack-height", `${nextHeight}px`);

        if (hasToasts && attempt < 2 && Math.abs(nextHeight - currentHeight) > 1) {
          window.requestAnimationFrame(() => syncToastStackHeight(attempt + 1));
        }
      }

      function renderToasts() {
        toastRail.innerHTML = toasts
          .map(
            (toast) => `
              <article class="tour-toast" data-status="${escapeHtml(toast.status)}">
                <span class="tour-toast-step">${escapeHtml(toast.label)}</span>
                <h2 class="tour-toast-title">${escapeHtml(toast.title)}</h2>
                <p class="tour-toast-body">${escapeHtml(toast.body)}</p>
              </article>
            `
          )
          .join("");

        window.requestAnimationFrame(() => {
          syncToastStackHeight();
          queueEmbedHeightReport(false);
        });
      }

      function pushToast({ label, title, body, status = "active" }) {
        const toast = { id: ++toastCounter, label, title, body, status };
        toasts.push(toast);
        if (toasts.length > MAX_TOASTS) {
          toasts.splice(0, toasts.length - MAX_TOASTS);
        }
        renderToasts();
        return toast.id;
      }

      function updateToast(id, patch) {
        const toast = toasts.find((entry) => entry.id === id);
        if (!toast) return;
        Object.assign(toast, patch);
        renderToasts();
      }

      function setScriptButtonState(running) {
        isScriptRunning = running;
        scriptButton.disabled = running;

      let lastReportedEmbedHeight = 0;

      function measureEmbedHeight() {
        const doc = document.documentElement;
        const body = document.body;

        return Math.max(
          window.innerHeight || 0,
          doc ? doc.scrollHeight : 0,
          doc ? doc.offsetHeight : 0,
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0
        );
      }

      function reportEmbedHeight(force = false) {
        if (window.parent === window) return;

        const nextHeight = Math.max(640, Math.round(measureEmbedHeight()));
        if (!force && nextHeight === lastReportedEmbedHeight) return;

        lastReportedEmbedHeight = nextHeight;
        window.parent.postMessage({ type: "pf-iframe-height", height: nextHeight }, "*");
      }

      function queueEmbedHeightReport(force = false) {
        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(() => {
            reportEmbedHeight(force);
          });
        });
      }

      function bindEmbedHeightReporting() {
        window.addEventListener("load", () => {
          queueEmbedHeightReport(true);
          window.setTimeout(() => queueEmbedHeightReport(true), 140);
          window.setTimeout(() => queueEmbedHeightReport(true), 540);
        });

        window.addEventListener("resize", () => {
          queueEmbedHeightReport(false);
        });

        window.addEventListener("message", (event) => {
          if (event && event.data && event.data.type === "pf-request-height") {
            queueEmbedHeightReport(true);
          }
        });

        if ("ResizeObserver" in window) {
          const observer = new ResizeObserver(() => {
            queueEmbedHeightReport(false);
          });

          if (document.documentElement) observer.observe(document.documentElement);
          if (document.body) observer.observe(document.body);
        }
      }
